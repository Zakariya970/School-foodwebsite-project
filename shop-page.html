<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>

  <style>
    body {
      background: linear-gradient(135deg, #4facfe, #8e44ad);
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
    }

    h1 {
      text-align: center;
      color: red;
    }

    #form {
      width: 800px;
      height: 400px;
      background-color: pink;
      border: 5px solid red;
      margin: auto;
      padding: 20px;
    }

    #delivery {
      text-align: center;
      margin-top: 30px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid #ddd;
    }

    .cart-item img {
      width: 100px;
      height: 100px;
    }

    .total-container {
      text-align: center;
      font-size: 1.5em;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
      border: none;
      background-color: #28a745;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>Welcome to OSFC</h1>

<h2 style="text-align:center;">Your Shopping Cart</h2>

<div class="cart-item">
  <img src="bur.jpg">
  <p>£10.00</p>
  <input type="number" value="0" min="0" id="quantity1">
</div>

<div class="cart-item">
  <img src="chips.jpg">
  <p>£15.00</p>
  <input type="number" value="0" min="0" id="quantity2">
</div>

<div class="cart-item">
  <img src="s.jpg">
  <p>£15.00</p>
  <input type="number" value="0" min="0" id="quantity3">
</div>

<div class="cart-item">
  <img src="steak.jpg">
  <p>£15.00</p>
  <input type="number" value="0" min="0" id="quantity4">
</div>

<div class="cart-item">
  <img src="chap.jpg">
  <p>£15.00</p>
  <input type="number" value="0" min="0" id="quantity5">
</div>

<div class="cart-item">
  <img src="pasta.jpg">
  <p>£15.00</p>
  <input type="number" value="0" min="0" id="quantity6">
</div>

<div class="total-container">
  Total: <span id="total-price">£0.00</span>
</div>

<div style="text-align:center;">
  <button onclick="updateCart()">Update Cart</button>
  <button onclick="checkout()">Checkout</button>
</div>

<hr>

<section id="form">
  <form onsubmit="return false;">
    Name:<br>
    <input type="text"><br>

    Email:<br>
    <input type="email"><br>

    Bank:<br>
    <input type="text"><br>

    Card number:<br>
    <input type="text"><br><br>

    <button onclick="payNow()">PAY NOW!</button>
  </form>
</section>

<hr>

<section id="delivery">
  <h2>How would you like to receive your order?</h2>

  <!-- ONLY COLLECT FROM SHOP -->
  <button onclick="collectFromShop()">Collect from Shop</button>
</section>

<script>
  function calculateTotal() {
    const prices = [10, 15, 15, 15, 15, 15];
    let total = 0;

    for (let i = 1; i <= 6; i++) {
      let qty = document.getElementById("quantity" + i).value;
      total += prices[i - 1] * qty;
    }

    document.getElementById("total-price").textContent = "£" + total.toFixed(2);
  }

  function updateCart() {
    calculateTotal();
  }

  function checkout() {
    calculateTotal();
    alert("Proceed to payment below.");
    document.getElementById("form").scrollIntoView();
  }

  function payNow() {
    alert("Payment successful! Now choose collection method.");
    document.getElementById("delivery").scrollIntoView();
  }

  function collectFromShop() {
    alert("Your order will be ready for collection at the shop!");
  }
</script>

</body>
</html>
